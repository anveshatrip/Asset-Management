name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Backend: Build & Package
  # ──────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pocemp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & package
        run: mvn clean package -DskipTests

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: pocemp/target/*.jar
          retention-days: 3

  # ──────────────────────────────────────────────
  # Frontend: Build & Validate
  # ──────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: one

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: one/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          CI: false

  # ──────────────────────────────────────────────
  # Deploy Backend to Render
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deployment triggered successfully"

  # ──────────────────────────────────────────────
  # Frontend deploys automatically via Vercel's
  # GitHub integration (no action needed here)
  # ──────────────────────────────────────────────